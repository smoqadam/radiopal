services:
  icecast:
    image: libretime/icecast:2.4.4
    container_name: radiopal-icecast
    ports:
      - "8000:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD}
      ICECAST_RELAY_PASSWORD: ${ICECAST_RELAY_PASSWORD:-${ICECAST_SOURCE_PASSWORD}}
      ICECAST_HOSTNAME: localhost
    restart: unless-stopped

  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    container_name: radiopal-liquidsoap
    depends_on:
      - icecast
    ports:
      - "1234:1234"          # telnet: push dynamic content here
    environment:
      ICECAST_SOURCE_USER: ${ICECAST_SOURCE_USER:-source}
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD}
    volumes:
      - ./liquidsoap/radio.liq:/radio.liq:ro
      - ${MUSIC_DIR:-./music}:/music:ro
      - ${STATION_IDS_DIR:-./station_ids}:/station_ids:ro
      - ${GENERATED_DIR:-./generated}:/generated:ro
      - ${SHORT_STORIES_DIR:-./short_stories}:/short_stories:ro
    command: ["liquidsoap", "/radio.liq"]
    restart: unless-stopped

  scheduler:
    build: .
    container_name: radiopal-scheduler
    depends_on:
      - liquidsoap
    ports:
      - "8080:8080"          # web UI + control API
    environment:
      LIQUIDSOAP_HOST: liquidsoap
      ICECAST_HOST: icecast
      GOOGLE_APPLICATION_CREDENTIALS: /app/creds/radiopal-tts.json
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      NEWSAPI_KEY: ${NEWSAPI_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./creds:/app/creds:ro

      - ${STATION_IDS_DIR:-./station_ids}:/app/station_ids:ro
      - ${GENERATED_DIR:-./generated}:/app/generated
      - ${SHORT_STORIES_DIR:-./short_stories}:/app/short_stories

    restart: unless-stopped
