services:
  icecast:
    image: moul/icecast
    container_name: radiopal-icecast
    ports:
      - "8000:8000"
    environment:
      - ICECAST_SOURCE_PASSWORD=hackme
      - ICECAST_ADMIN_PASSWORD=hackme
      - ICECAST_PASSWORD=hackme
      - ICECAST_RELAY_PASSWORD=hackme
      - ICECAST_HOSTNAME=localhost
    restart: unless-stopped

  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    container_name: radiopal-liquidsoap
    command: /config/radio.liq
    working_dir: /app
    depends_on:
      - icecast
    ports:
      - "1234:1234"
    volumes:
      - ./config/radio.liq:/config/radio.liq:ro
      - ./music:/app/music
      - ./media:/app/media
      - ./short_stories:/app/short_stories
    restart: unless-stopped

  scheduler:
    image: ${RADIOPAL_IMAGE:-radiopal-rs:latest}
    build: .
    container_name: radiopal-scheduler
    working_dir: /app
    depends_on:
      - liquidsoap
      - icecast
    environment:
      - RADIOPAL_CONFIG=/config/config.yaml
      - RADIOPAL_STATE_FILE=/data/selector_state.json
      - RADIOPAL_LIQUIDSOAP_ADDR=liquidsoap:1234
    volumes:
      - ./config:/config:ro
      - ./music:/app/music
      - ./media:/app/media
      - ./short_stories:/app/short_stories
      - ./data:/data
    restart: unless-stopped
