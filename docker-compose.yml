services:
  icecast:
    image: libretime/icecast:2.4.4
    container_name: radiopal-icecast
    ports:
      - "8000:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: hackme
      ICECAST_ADMIN_PASSWORD: admin
      ICECAST_RELAY_PASSWORD: hackme
      ICECAST_HOSTNAME: localhost
    restart: unless-stopped

  liquidsoap:
    image: savonet/liquidsoap:v2.2.5
    container_name: radiopal-liquidsoap
    depends_on:
      - icecast
    ports:
      - "1234:1234"          # telnet: push dynamic content here
    volumes:
      - ./liquidsoap/radio.liq:/radio.liq:ro
      - ./music:/music:ro
      - ./station_ids:/station_ids:ro
      - ./generated:/generated:ro
    command: ["liquidsoap", "/radio.liq"]
    restart: unless-stopped

  scheduler:
    build: .
    container_name: radiopal-scheduler
    depends_on:
      - liquidsoap
    environment:
      LIQUIDSOAP_HOST: liquidsoap
      GOOGLE_APPLICATION_CREDENTIALS: /app/creds/radiopal-tts.json
    env_file:
      - ./creds/deepseek.env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./station_ids:/app/station_ids:ro
      - ./creds:/app/creds:ro
      - ./generated:/app/generated
    restart: unless-stopped
