  # ganjoor: random poem + recitation from ganjoor.net
  # poet_id (0 = random poet):
  #   حافظ 2, خیام 3, ابوسعید ابوالخیر 26, صائب 22, سعدی 7, باباطاهر 28,
  #   مولوی 5, اوحدی 19, خواجو 20, شهریار 35, عراقی 21, فروغی بسطامی 32,
  #   سلمان ساوجی 40, محتشم کاشانی 29, امیرخسرو دهلوی 34, سیف فرغانی 31,
  #   عبید زاکانی 33, هاتف اصفهانی 25, رهی معیری 41
  - name: ganjoor_hafez
    lane: next
    lead: 60
    every: "3h"
    select: random
    action:
      type: ganjoor
      poet_id: 2
      cache: content/media/cache


  - name: ganjoor_random
    lane: next
    lead: 60
    every: "4h"
    select: random
    action:
      type: ganjoor
      poet_id: 0
      cache: content/media/cache
