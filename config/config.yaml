tick_seconds: 10
liquidsoap_addr: "127.0.0.1:1234"

# web ui: served on 0.0.0.0:8080 (override with RADIOPAL_WEB_ADDR).
# stream_url is where the browser <audio> element points — set it to your
# public Icecast URL (host:icecast_port/mount).
stream_url: "http://localhost:8003/radio"


schedules:

  - name: calm
    lane: next
    lead: 300
    every: "7h"
    select: shuffle
    action:
      type: youtube
      url: "https://www.youtube.com/channel/UChSpME3QaSFAWK8Hpmg-Dyw"
      cache: content/media/cache


