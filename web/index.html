<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RadioPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #17181a;
      --panel: #1d1f22;
      --panel-raised: #232529;
      --ink: #e7e8ea;
      --ink-dim: #9a9da3;
      --ink-faint: #616469;
      --hairline: #2b2d31;
      --accent: #d4d5d9;
      --accent-dim: #4a4c51;
      --off: #3a3c40;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.6;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 40px 20px 72px; }

    /* ---------- Masthead ---------- */
    .masthead {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--hairline);
    }
    .wordmark { display: flex; align-items: baseline; gap: 10px; }
    .wordmark-main {
      font-weight: 300;
      font-size: 24px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink);
    }
    .wordmark-freq {
      font-weight: 300;
      font-size: 12px;
      color: var(--ink-dim);
      letter-spacing: 1.5px;
      border: 1px solid var(--hairline);
      padding: 3px 8px;
    }
    .lamp-row { display: flex; align-items: center; gap: 8px; padding-bottom: 3px; }
    .lamp {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--off);
      box-shadow: none;
      transition: background .3s ease, box-shadow .3s ease;
    }
    .lamp.on {
      background: var(--accent);
      box-shadow: 0 0 6px 1px rgba(212,213,217,0.5);
    }
    .lamp-label {
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--ink-faint);
      text-transform: uppercase;
    }
    .lamp-label.on { color: var(--accent); }

    /* ---------- Player panel ---------- */
    .player {
      background: var(--panel);
      border: 1px solid var(--hairline);
      padding: 22px 22px 20px;
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
    }

    .eq {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 34px;
      margin-bottom: 18px;
    }
    .eq span {
      flex: 1;
      background: var(--off);
      height: 12%;
      transition: background .4s ease;
    }
    .eq.live span {
      background: var(--accent);
      animation: bounce 1.1s ease-in-out infinite;
    }
    .eq span:nth-child(1) { animation-delay: -0.9s; }
    .eq span:nth-child(2) { animation-delay: -0.5s; }
    .eq span:nth-child(3) { animation-delay: -1.3s; }
    .eq span:nth-child(4) { animation-delay: -0.1s; }
    .eq span:nth-child(5) { animation-delay: -0.7s; }
    .eq span:nth-child(6) { animation-delay: -1.5s; }
    .eq span:nth-child(7) { animation-delay: -0.3s; }
    .eq span:nth-child(8) { animation-delay: -1.1s; }
    .eq span:nth-child(9) { animation-delay: -0.6s; }
    .eq span:nth-child(10) { animation-delay: -1.4s; }
    .eq span:nth-child(11) { animation-delay: -0.2s; }
    .eq span:nth-child(12) { animation-delay: -1.0s; }
    .eq span:nth-child(13) { animation-delay: -0.4s; }
    .eq span:nth-child(14) { animation-delay: -1.2s; }
    .eq span:nth-child(15) { animation-delay: -0.8s; }
    .eq span:nth-child(16) { animation-delay: -0.15s; }
    .eq span:nth-child(17) { animation-delay: -1.35s; }
    .eq span:nth-child(18) { animation-delay: -0.55s; }
    .eq span:nth-child(19) { animation-delay: -0.95s; }
    .eq span:nth-child(20) { animation-delay: -0.25s; }

    @keyframes bounce {
      0%, 100% { height: 12%; }
      50% { height: 100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .eq.live span { animation: none; height: 55%; }
    }

    .now-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--ink-faint);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .now-name {
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.3px;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .now-time {
      font-size: 11px;
      color: var(--ink-faint);
      margin-top: 8px;
    }

    audio {
      width: 100%;
      margin-top: 18px;
      height: 36px;
      filter: invert(0.9) grayscale(1) contrast(0.9);
    }

    /* ---------- Schedule ---------- */
    h2 {
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-faint);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 0 14px;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 10px; font-size: 12.5px; border-bottom: 1px solid var(--hairline); }
    th {
      color: var(--ink-faint);
      font-weight: 400;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid var(--hairline);
    }
    td.name { color: var(--ink); font-weight: 400; }
    td.dim { color: var(--ink-dim); }
    tr.live td { background: rgba(255,255,255,0.03); }
    tr.live td.name { color: var(--accent); }
    tr.next td.name { color: var(--ink); }

    .when-timing { color: var(--ink-dim); }
    .countdown { display: block; font-size: 10.5px; color: var(--ink-faint); letter-spacing: 0.3px; margin-top: 2px; }
    .countdown.soon { color: var(--accent); }
    .countdown.onair { color: var(--accent); }

    .footer {
      margin-top: 40px;
      padding-top: 18px;
      border-top: 1px solid var(--hairline);
      font-size: 11px;
      letter-spacing: 0.5px;
      color: var(--ink-faint);
      text-align: center;
    }
    .footer a { color: var(--ink-dim); text-decoration: none; border-bottom: 1px solid var(--accent-dim); }
    .footer a:hover { color: var(--ink); }

    .chip {
      display: inline-block;
      padding: 2px 7px;
      font-size: 10px;
      letter-spacing: 0.5px;
      background: var(--panel-raised);
      border: 1px solid var(--hairline);
      color: var(--ink-dim);
    }

    @media (max-width: 560px) {
      thead { display: none; }
      table, tbody, tr, td { display: block; width: 100%; }
      tr { border-bottom: 1px solid var(--hairline); padding: 10px 0; }
      tr.live { border-left: 2px solid var(--accent); padding-left: 8px; }
      td { border-bottom: none; padding: 3px 2px; }
      td.name { font-size: 14px; font-weight: 400; }
      td.dim::before { content: attr(data-label); color: var(--ink-faint); margin-right: 6px; }
    }

    audio:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <div class="wordmark">
      <span class="wordmark-main" id="station">Radio</span>
      <span class="wordmark-freq">On&nbsp;Air</span>
    </div>
    <div class="lamp-row">
      <span class="lamp" id="lamp"></span>
      <span class="lamp-label" id="lamp-label">OFF AIR</span>
    </div>
  </div>

  <div class="player">
    <div class="eq" id="eq"></div>

    <div class="now-label">Now playing</div>
    <div class="now-name" id="now-name">—</div>
    <div class="now-time" id="now-time"></div>
    <audio id="audio" controls preload="none"></audio>
  </div>

  <h2>Schedule</h2>
  <table>
    <thead>
    <tr><th>Program</th><th>When</th><th>Lane</th><th>Select</th><th>Source</th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <footer class="footer">made by <a href="https://github.com/smoqadam/radiopal" rel="noopener">RadioPal</a></footer>
</div>

<script>
  const audio = document.getElementById('audio');
  const eqEl = document.getElementById('eq');
  const lampEl = document.getElementById('lamp');
  const lampLabelEl = document.getElementById('lamp-label');
  let streamUrl = null;

  // Build the equalizer bars once (purely decorative, no behavior change).
  for (let i = 0; i < 20; i++) {
    const bar = document.createElement('span');
    eqEl.appendChild(bar);
  }

  // Fresh URL each connection: bypasses HTTP/media caching so we always
  // attach at the live edge instead of replaying buffered/cached bytes.
  function liveSrc() {
    return streamUrl + (streamUrl.includes('?') ? '&' : '?') + '_=' + Date.now();
  }

  // Connect only when the user presses play, and reconnect on every (re)play
  // so pausing then resuming jumps back to live rather than the stale buffer.
  audio.addEventListener('play', () => {
    if (!streamUrl || audio.dataset.live) return;
    audio.dataset.live = '1';
    audio.src = liveSrc();
    audio.load();
    audio.play().catch(() => {});
    eqEl.classList.add('live');
  });
  audio.addEventListener('pause', () => {
    delete audio.dataset.live;
    eqEl.classList.remove('live');
  });

  function ago(since) {
    if (!since) return '';
    const s = Math.max(0, Math.floor(Date.now() / 1000) - since);
    if (s < 60) return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s / 60)}m ago`;
    return `${Math.floor(s / 3600)}h ago`;
  }

  // "in 2h 14m" / "in 45m" / "in 30s" until a unix timestamp.
  function until(ts) {
    let s = ts - Math.floor(Date.now() / 1000);
    if (s <= 0) return 'due now';
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    if (h > 0) return `in ${h}h ${m}m`;
    if (m > 0) return `in ${m}m`;
    return `in ${s}s`;
  }

  function esc(str) {
    return String(str).replace(/[&<>"]/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
    ));
  }

  let last = null;

  function render(state) {
    last = state;
    streamUrl = state.stream_url;

    if (state.station) {
      document.getElementById('station').textContent = state.station;
      document.title = state.station;
    }

    const now = state.now;
    const liveTitle = now ? now.name : null;
    document.getElementById('now-name').textContent = now ? now.name : 'nothing on air';
    document.getElementById('now-time').textContent = now && now.since ? 'started ' + ago(now.since) : '';

    lampEl.classList.toggle('on', !!now);
    lampLabelEl.classList.toggle('on', !!now);
    lampLabelEl.textContent = now ? 'ON AIR' : 'OFF AIR';

    // The soonest-upcoming schedule that isn't already on air → "up next".
    let soonest = null;
    for (const s of state.schedules) {
      if (s.title === liveTitle) continue;
      if (!soonest || s.next_run < soonest.next_run) soonest = s;
    }

    const rows = state.schedules.map(s => {
      const isLive = s.title === liveTitle;
      const isNext = !isLive && soonest && s.title === soonest.title;
      const secs = s.next_run - Math.floor(Date.now() / 1000);
      let cd, cdClass = 'countdown';
      if (isLive) { cd = 'on air now'; cdClass += ' onair'; }
      else { cd = until(s.next_run); if (isNext || secs < 900) cdClass += ' soon'; }
      if (isNext) cd = 'up next · ' + cd;

      return `
      <tr class="${isLive ? 'live' : ''}${isNext ? ' next' : ''}">
        <td class="name">${esc(s.title)}</td>
        <td data-label="When">
          <span class="when-timing">${esc(s.timing)}</span>
          <span class="${cdClass}">${cd}</span>
        </td>
        <td><span class="chip">${esc(s.lane)}</span></td>
        <td class="dim" data-label="Select">${esc(s.select)}</td>
        <td class="dim" data-label="Source">${esc(s.action)}</td>
      </tr>`;
    }).join('');
    document.getElementById('rows').innerHTML = rows;
  }

  async function poll() {
    try {
      const r = await fetch('/api/state');
      render(await r.json());
    } catch (e) { /* keep last view */ }
  }

  poll();
  setInterval(poll, 5000);
  // Tick countdowns every second between server polls.
  setInterval(() => { if (last) render(last); }, 1000);
</script>
</body>
</html>
